<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nacré — Luxury Beauty Edit</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=Playfair+Display:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--white:#fff;--bg:#F5F4F2;--border:#E8E8E8;--text:#111;--muted:#888;--gold:#C9A96E;--sidebar:68px;--radius:16px}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);display:flex;min-height:100vh;overflow-x:hidden}

/* SIDEBAR */
.sidebar{width:var(--sidebar);background:var(--white);border-right:1px solid var(--border);position:fixed;top:0;left:0;bottom:0;display:flex;flex-direction:column;align-items:center;padding:16px 0;gap:4px;z-index:200}
.logo-mark{font-family:'Playfair Display',serif;font-size:11px;letter-spacing:.15em;color:var(--text);writing-mode:vertical-rl;transform:rotate(180deg);margin-bottom:20px;text-decoration:none;font-weight:600}
.sicon{width:44px;height:44px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:20px;cursor:pointer;transition:background .15s;border:none;background:transparent;color:var(--muted)}
.sicon:hover,.sicon.active{background:var(--bg);color:var(--text)}

/* MAIN */
.main{margin-left:var(--sidebar);flex:1;min-height:100vh;display:flex;flex-direction:column}

/* TOPBAR */
.topbar{background:var(--white);border-bottom:1px solid var(--border);padding:0 1.5rem;height:60px;display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:100}
.search-wrap{flex:1;max-width:520px;position:relative}
.search-wrap input{width:100%;background:var(--bg);border:1.5px solid transparent;border-radius:40px;padding:10px 20px 10px 42px;font-family:'DM Sans',sans-serif;font-size:14px;color:var(--text);outline:none;transition:border-color .2s}
.search-wrap input:focus{border-color:#ccc}
.search-wrap input::placeholder{color:var(--muted)}
.search-icon{position:absolute;left:15px;top:50%;transform:translateY(-50%);color:var(--muted);font-size:15px;pointer-events:none}
.follow-btn{margin-left:auto;background:var(--text);color:var(--white);border:none;border-radius:40px;padding:9px 20px;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:500;cursor:pointer;text-decoration:none;white-space:nowrap;transition:opacity .15s}
.follow-btn:hover{opacity:.8}

/* HERO */
.hero{background:var(--white);padding:2.5rem 1.5rem 2rem;display:flex;align-items:center;justify-content:space-between;gap:2rem;border-bottom:1px solid var(--border)}
.hero h1{font-family:'Playfair Display',serif;font-size:clamp(1.8rem,3.5vw,3rem);font-weight:400;line-height:1.15;margin-bottom:.75rem}
.hero h1 em{font-style:italic;color:var(--gold)}
.hero p{font-size:14px;color:var(--muted);max-width:380px;line-height:1.7}
.hero-stats{display:flex;gap:2rem;flex-shrink:0}
.stat{text-align:center}
.stat-n{font-family:'Playfair Display',serif;font-size:1.8rem;font-weight:600}
.stat-l{font-size:11px;color:var(--muted);margin-top:2px}

/* CATEGORY BAR */
.cat-bar{background:var(--white);border-bottom:1px solid var(--border);padding:0 1.5rem;display:flex;gap:8px;overflow-x:auto;scrollbar-width:none;height:52px;align-items:center}
.cat-bar::-webkit-scrollbar{display:none}
.cat-pill{display:flex;align-items:center;gap:6px;white-space:nowrap;padding:6px 16px;border-radius:40px;border:1.5px solid var(--border);background:transparent;font-family:'DM Sans',sans-serif;font-size:13px;color:var(--muted);cursor:pointer;transition:all .15s;flex-shrink:0}
.cat-pill:hover{border-color:#999;color:var(--text)}
.cat-pill.active{background:var(--text);border-color:var(--text);color:var(--white)}

/* CONTENT */
.content{padding:1.5rem;flex:1}
.section{margin-bottom:2.5rem}
.section-head{display:flex;align-items:baseline;justify-content:space-between;margin-bottom:1rem}
.section-title{font-family:'Playfair Display',serif;font-size:1.25rem;font-weight:400}
.section-count{font-size:12px;color:var(--muted)}

/* PRODUCT GRID - shop.app style */
.product-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:14px}

/* CARD */
.card{background:var(--white);border-radius:var(--radius);overflow:hidden;border:1px solid var(--border);cursor:pointer;transition:box-shadow .2s,transform .2s}
.card:hover{box-shadow:0 6px 24px rgba(0,0,0,.08);transform:translateY(-2px)}
.card-img{aspect-ratio:1;background:var(--bg);overflow:hidden;position:relative}
.card-img img{width:100%;height:100%;object-fit:cover;transition:transform .35s}
.card:hover .card-img img{transform:scale(1.05)}
.img-ph{width:100%;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;background:linear-gradient(135deg,#f5f0ea,#ede8e0)}
.ph-letter{font-family:'Playfair Display',serif;font-size:3rem;color:#C4B49A;font-style:italic}
.ph-name{font-size:11px;color:#B0A898;text-align:center;padding:0 .75rem;line-height:1.4}
.card-badge{position:absolute;top:10px;left:10px;background:rgba(255,255,255,.95);border-radius:40px;padding:3px 10px;font-size:10px;font-weight:500;color:var(--gold);border:1px solid rgba(201,169,110,.3)}
.card-body{padding:12px 14px}
.card-brand{font-size:10px;font-weight:600;color:var(--muted);letter-spacing:.06em;text-transform:uppercase;margin-bottom:4px}
.card-name{font-size:13px;color:var(--text);line-height:1.4;margin-bottom:6px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;min-height:2.8em}
.card-rating-row{display:flex;align-items:center;gap:5px;margin-bottom:10px}
.card-stars{color:#F5A623;font-size:11px;letter-spacing:1px}
.card-rcount{font-size:11px;color:var(--muted)}
.card-btn{width:100%;background:var(--text);color:var(--white);border:none;border-radius:10px;padding:9px;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:500;cursor:pointer;transition:background .15s}
.card-btn:hover{background:#333}

/* SKELETON */
.skel{background:var(--white);border-radius:var(--radius);border:1px solid var(--border);overflow:hidden}
.skel-img{aspect-ratio:1;background:linear-gradient(90deg,#f0f0f0 25%,#e8e8e8 50%,#f0f0f0 75%);background-size:200% 100%;animation:sh 1.5s infinite}
.skel-body{padding:12px 14px}
.skel-line{height:11px;border-radius:6px;margin-bottom:8px;background:linear-gradient(90deg,#f0f0f0 25%,#e8e8e8 50%,#f0f0f0 75%);background-size:200% 100%;animation:sh 1.5s infinite}
.skel-line.s{width:55%}.skel-line.b{height:32px;margin-top:10px;border-radius:10px}
@keyframes sh{0%{background-position:200% 0}100%{background-position:-200% 0}}

.no-results{display:none;text-align:center;padding:4rem 2rem;color:var(--muted)}
.no-results h3{font-family:'Playfair Display',serif;font-size:1.4rem;color:var(--text);margin-bottom:.5rem}

/* OVERLAY + PANEL */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:300;opacity:0;pointer-events:none;transition:opacity .3s}
.overlay.open{opacity:1;pointer-events:all}
.panel{position:fixed;top:0;right:0;bottom:0;width:min(580px,100vw);background:var(--white);z-index:301;transform:translateX(100%);transition:transform .35s cubic-bezier(.4,0,.2,1);overflow-y:auto;display:flex;flex-direction:column;box-shadow:-4px 0 40px rgba(0,0,0,.12)}
.panel.open{transform:translateX(0)}
.panel-close{position:absolute;top:14px;right:14px;width:34px;height:34px;border-radius:50%;background:rgba(0,0,0,.06);border:none;cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;color:var(--text);z-index:10;transition:background .15s}
.panel-close:hover{background:rgba(0,0,0,.12)}
.panel-img{width:100%;aspect-ratio:1;background:var(--bg);overflow:hidden;position:relative;flex-shrink:0}
.panel-img img{width:100%;height:100%;object-fit:cover}
.panel-img-ph{width:100%;height:100%;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#f5f0ea,#ede8e0);font-family:'Playfair Display',serif;font-size:6rem;color:#C4B49A;font-style:italic}
.panel-body{padding:1.5rem;flex:1}
.panel-brand{font-size:11px;font-weight:600;color:var(--muted);letter-spacing:.08em;text-transform:uppercase;margin-bottom:6px}
.panel-name{font-family:'Playfair Display',serif;font-size:1.5rem;font-weight:400;line-height:1.2;margin-bottom:10px}
.panel-rating{display:flex;align-items:center;gap:8px;margin-bottom:14px}
.panel-stars{color:#F5A623;font-size:14px;letter-spacing:1px}
.panel-rcount{font-size:13px;color:var(--muted)}
.panel-badge{display:inline-block;background:#FFF8EE;color:var(--gold);border:1px solid rgba(201,169,110,.3);border-radius:40px;padding:3px 12px;font-size:11px;font-weight:500;margin-bottom:14px}
.panel-desc{font-size:14px;color:var(--muted);line-height:1.7;margin-bottom:18px;padding-bottom:18px;border-bottom:1px solid var(--border)}
.panel-sec{font-size:11px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);margin-bottom:10px;margin-top:16px}
.pros-list{list-style:none;display:flex;flex-direction:column;gap:6px;margin-bottom:16px}
.pros-list li{font-size:13px;color:var(--text);padding-left:1.4rem;position:relative;line-height:1.5}
.pros-list li::before{content:'✓';position:absolute;left:0;color:var(--gold)}
.how-to-box{background:var(--bg);border-radius:12px;padding:14px 16px;margin-bottom:18px;font-size:13px;color:var(--muted);line-height:1.7}
.retailer-btns{display:flex;flex-direction:column;gap:8px;padding-bottom:2rem}
.r-btn{display:flex;align-items:center;justify-content:space-between;padding:14px 16px;border-radius:12px;border:1.5px solid var(--border);text-decoration:none;color:var(--text);font-size:14px;font-weight:500;transition:all .15s;background:var(--white)}
.r-btn:hover{border-color:#999}
.r-btn.primary{background:var(--text);color:var(--white);border-color:var(--text)}
.r-btn.primary:hover{background:#333;border-color:#333}
.r-left{display:flex;align-items:center;gap:10px}
.r-sub{font-size:11px;font-weight:400;opacity:.6;display:block;margin-top:1px}
.r-arrow{opacity:.5;font-size:16px}
.r-btn.primary .r-arrow{opacity:.7}

@media(max-width:700px){
  :root{--sidebar:0px}
  .sidebar{display:none}
  .topbar{padding:0 1rem}
  .hero{flex-direction:column;padding:1.5rem 1rem}
  .hero-stats{justify-content:center}
  .cat-bar{padding:0 1rem}
  .content{padding:1rem}
  .product-grid{grid-template-columns:repeat(2,1fr);gap:10px}
  .panel{width:100vw}
}
</style>
</head>
<body>

<aside class="sidebar">
  <a href="/" class="logo-mark">NACRÉ</a>
  <button class="sicon active" onclick="filterCat('all',this)" title="All">🏠</button>
  <button class="sicon" onclick="filterCat('skincare',this)" title="Skincare">✨</button>
  <button class="sicon" onclick="filterCat('makeup',this)" title="Makeup">💄</button>
  <button class="sicon" onclick="filterCat('fragrance',this)" title="Fragrance">🌸</button>
  <button class="sicon" onclick="filterCat('haircare',this)" title="Haircare">💆</button>
  <button class="sicon" onclick="filterCat('body_care',this)" title="Body Care">🛁</button>
  <button class="sicon" onclick="filterCat('nail_care',this)" title="Nails">💅</button>
  <button class="sicon" onclick="filterCat('beauty_tools',this)" title="Tools">🔧</button>
  <a href="https://instagram.com/maisonglow412" target="_blank" class="sicon" style="margin-top:auto" title="Instagram">📷</a>
</aside>

<div class="main">
  <header class="topbar">
    <div class="search-wrap">
      <span class="search-icon">🔍</span>
      <input type="text" id="search" placeholder="Search beauty products...">
    </div>
    <a href="https://instagram.com/maisonglow412" target="_blank" class="follow-btn">📷 @maisonglow412</a>
  </header>

  <div class="hero">
    <div>
      <h1>Discover beauty<br>worth <em>loving</em></h1>
      <p>Hand-picked luxury beauty finds from Sephora, Amazon and Glossier — reviewed, compared, and linked for you.</p>
    </div>
    <div class="hero-stats">
      <div class="stat"><div class="stat-n" id="total-count">—</div><div class="stat-l">Products</div></div>
      <div class="stat"><div class="stat-n">8</div><div class="stat-l">Categories</div></div>
      <div class="stat"><div class="stat-n">5</div><div class="stat-l">Retailers</div></div>
    </div>
  </div>

  <div class="cat-bar">
    <button class="cat-pill active" onclick="filterCat('all',this)">🛍 All</button>
    <button class="cat-pill" onclick="filterCat('skincare',this)">✨ Skincare</button>
    <button class="cat-pill" onclick="filterCat('makeup',this)">💄 Makeup</button>
    <button class="cat-pill" onclick="filterCat('fragrance',this)">🌸 Fragrance</button>
    <button class="cat-pill" onclick="filterCat('haircare',this)">💆 Haircare</button>
    <button class="cat-pill" onclick="filterCat('body_care',this)">🛁 Body Care</button>
    <button class="cat-pill" onclick="filterCat('nail_care',this)">💅 Nails</button>
    <button class="cat-pill" onclick="filterCat('beauty_tools',this)">🔧 Tools</button>
    <button class="cat-pill" onclick="filterCat('wellness_beauty',this)">🌿 Wellness</button>
  </div>

  <div class="content">
    <div id="container"></div>
    <div class="no-results" id="no-results">
      <h3>No products found</h3>
      <p>Try a different search or category</p>
    </div>
  </div>
</div>

<!-- OVERLAY + SLIDE-IN PANEL -->
<div class="overlay" id="overlay" onclick="closePanel()"></div>
<div class="panel" id="panel">
  <button class="panel-close" onclick="closePanel()">✕</button>
  <div id="panel-content"></div>
</div>

<script>
let allProducts = [];
let currentCat = 'all';
window._filtered = [];

const CATS = {
  skincare:'Skincare', makeup:'Makeup', fragrance:'Fragrance',
  haircare:'Haircare', body_care:'Body Care', nail_care:'Nail Care',
  beauty_tools:'Beauty Tools', wellness_beauty:'Wellness'
};

function stars(r) {
  const n = Math.round(parseFloat(r) || 4);
  return '★'.repeat(n) + '☆'.repeat(5 - n);
}

function imgEl(url, name) {
  const l = (name || 'N')[0].toUpperCase();
  const ph = `<div class="img-ph"><div class="ph-letter">${l}</div><div class="ph-name">${name}</div></div>`;
  if (!url) return ph;
  return `<img src="${url}" alt="${name}" loading="lazy" onerror="this.parentElement.innerHTML='${ph.replace(/'/g,'"')}'"  style="width:100%;height:100%;object-fit:cover">`;
}

function buildCard(p, idx) {
  return `
  <div class="card" onclick="openPanel(${idx})">
    <div class="card-img">
      ${imgEl(p.image_url, p.name)}
      ${p.badge ? `<div class="card-badge">${p.badge}</div>` : ''}
    </div>
    <div class="card-body">
      <div class="card-brand">${p.brand || ''}</div>
      <div class="card-name">${p.name || ''}</div>
      <div class="card-rating-row">
        <span class="card-stars">${stars(p.rating)}</span>
        <span class="card-rcount">${p.rating || ''} ${p.reviews ? `(${p.reviews})` : ''}</span>
      </div>
      <button class="card-btn">View Product</button>
    </div>
  </div>`;
}

function openPanel(idx) {
  const p = window._filtered[idx];
  if (!p) return;

  const l = (p.name || 'N')[0].toUpperCase();
  const imgHtml = p.image_url
    ? `<img src="${p.image_url}" alt="${p.name}" style="width:100%;height:100%;object-fit:cover" onerror="this.outerHTML='<div class=panel-img-ph>${l}</div>'">`
    : `<div class="panel-img-ph">${l}</div>`;

  // Build retailer buttons — affiliate links open in new tab (correct for affiliate)
  let btns = '';
  if (p.sephora_url) btns += `<a href="${p.sephora_url}" target="_blank" rel="noopener" class="r-btn primary"><div class="r-left"><span>🖤</span><div><div>Sephora</div><span class="r-sub">Shop with affiliate link</span></div></div><span class="r-arrow">→</span></a>`;
  if (p.amazon_url)  btns += `<a href="${p.amazon_url}"  target="_blank" rel="noopener" class="r-btn"><div class="r-left"><span>📦</span><div><div>Amazon</div><span class="r-sub">Free shipping available</span></div></div><span class="r-arrow">→</span></a>`;
  if (p.ebay_url)    btns += `<a href="${p.ebay_url}"    target="_blank" rel="noopener" class="r-btn"><div class="r-left"><span>🛒</span><div><div>eBay</div><span class="r-sub">Compare prices</span></div></div><span class="r-arrow">→</span></a>`;
  if (!btns) {
    const shopUrl = p.affiliate_url || '#';
    btns = `<a href="${shopUrl}" target="_blank" rel="noopener" class="r-btn primary"><div class="r-left"><span>🛍</span><div><div>Shop Now</div><span class="r-sub">Best available price</span></div></div><span class="r-arrow">→</span></a>`;
  }

  const pros = Array.isArray(p.pros) ? p.pros : [];
  const prosList = pros.length ? `<div class="panel-sec">What we love</div><ul class="pros-list">${pros.map(x=>`<li>${x}</li>`).join('')}</ul>` : '';
  const howTo = p.how_to_use ? `<div class="panel-sec">How to use</div><div class="how-to-box">${p.how_to_use}</div>` : '';
  const desc = p.review_summary ? `<p class="panel-desc">${p.review_summary}</p>` : '';

  document.getElementById('panel-content').innerHTML = `
    <div class="panel-img">${imgHtml}</div>
    <div class="panel-body">
      <div class="panel-brand">${p.brand || ''}</div>
      <div class="panel-name">${p.name || ''}</div>
      <div class="panel-rating">
        <span class="panel-stars">${stars(p.rating)}</span>
        <span class="panel-rcount">${p.rating || ''} ${p.reviews ? `· ${p.reviews} reviews` : ''}</span>
      </div>
      ${p.badge ? `<div class="panel-badge">${p.badge}</div>` : ''}
      ${desc}
      ${prosList}
      ${howTo}
      <div class="panel-sec">Where to buy</div>
      <div class="retailer-btns">${btns}</div>
    </div>`;

  document.getElementById('overlay').classList.add('open');
  document.getElementById('panel').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closePanel() {
  document.getElementById('overlay').classList.remove('open');
  document.getElementById('panel').classList.remove('open');
  document.body.style.overflow = '';
}

document.addEventListener('keydown', e => { if (e.key === 'Escape') closePanel(); });

function showSkeletons() {
  document.getElementById('container').innerHTML =
    `<div class="product-grid">${Array(8).fill(`<div class="skel"><div class="skel-img"></div><div class="skel-body"><div class="skel-line s"></div><div class="skel-line"></div><div class="skel-line s"></div><div class="skel-line b"></div></div></div>`).join('')}</div>`;
}

function render(products) {
  window._filtered = products;
  const c = document.getElementById('container');
  const nr = document.getElementById('no-results');
  if (!products.length) { c.innerHTML = ''; nr.style.display = 'block'; return; }
  nr.style.display = 'none';

  const groups = {};
  products.forEach(p => {
    const k = (p.category || 'other').replace(/\s+/g, '_');
    if (!groups[k]) groups[k] = [];
    groups[k].push(p);
  });

  let globalIdx = 0;
  c.innerHTML = Object.entries(groups).map(([cat, items]) => {
    const label = CATS[cat] || cat.replace(/_/g, ' ');
    const cards = items.map(p => buildCard(p, globalIdx++)).join('');
    return `<div class="section">
      <div class="section-head">
        <h2 class="section-title">${label}</h2>
        <span class="section-count">${items.length} picks</span>
      </div>
      <div class="product-grid">${cards}</div>
    </div>`;
  }).join('');

  document.getElementById('total-count').textContent = products.length;
}

function filterCat(cat, btn) {
  currentCat = cat;
  document.querySelectorAll('.cat-pill').forEach(b => b.classList.remove('active'));
  document.querySelectorAll('.sicon').forEach(b => b.classList.remove('active'));
  if (btn) btn.classList.add('active');
  applyFilters();
}

function applyFilters() {
  const q = document.getElementById('search').value.toLowerCase();
  let f = allProducts;
  if (currentCat !== 'all') f = f.filter(p => (p.category || '').replace(/\s+/g, '_') === currentCat);
  if (q) f = f.filter(p => ((p.name || '') + ' ' + (p.brand || '') + ' ' + (p.category || '')).toLowerCase().includes(q));
  render(f);
}

async function load() {
  showSkeletons();
  try {
    const r = await fetch('./products.json?v=' + Date.now());
    if (!r.ok) throw new Error('no file');
    const data = await r.json();
    allProducts = data;
    console.log('Loaded', allProducts.length, 'products');
  } catch(e) {
    console.log('Using sample data:', e.message);
    allProducts = [
